services:
  postgres:
    image: postgres:17-alpine
    container_name: infergrid-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: infergrid
      POSTGRES_USER: infergrid
      POSTGRES_PASSWORD: infergrid
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infergrid -d infergrid"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.3-management-alpine
    container_name: infergrid-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: infergrid
      RABBITMQ_DEFAULT_PASS: infergrid
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
  rabbitmq_data: