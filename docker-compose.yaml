services:
  postgres:
    image: postgres:17-alpine
    container_name: infergrid-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: infergrid
      POSTGRES_USER: infergrid
      POSTGRES_PASSWORD: infergrid
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infergrid -d infergrid"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: